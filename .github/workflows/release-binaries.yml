name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release artifact
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist package
          BIN="token-transfer-processor-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME} -X main.CommitSHA=${GITHUB_SHA}" \
            -o "package/token-transfer-processor" \
            ./cmd/token-transfer-processor
          cp README.md package/
          cp LICENSE package/ 2>/dev/null || true
          tar -czf "dist/${BIN}.tar.gz" -C package .
          sha256sum "dist/${BIN}.tar.gz" > "dist/${BIN}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-transfer-processor-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate combined checksums file
        run: |
          cd release-artifacts
          cat *.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
          body: |
            ## Binaries

            Download prebuilt tarballs from the assets below.

            Example:

            ```bash
            tar -xzf token-transfer-processor-linux-amd64.tar.gz
            chmod +x token-transfer-processor
            ./token-transfer-processor --version
            ```

            Verify checksums:

            ```bash
            sha256sum -c checksums.txt
            ```

            ## Docker

            Docker publishing is intentionally separate and manual for now.
            Use the manual workflow if and when you want to publish an image.
