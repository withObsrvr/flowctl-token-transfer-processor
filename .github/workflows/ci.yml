name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify proto generation is up to date
        run: |
          make proto
          git diff --exit-code

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/token-transfer-processor
